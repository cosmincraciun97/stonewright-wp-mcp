name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  php-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4", "8.5"]
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: composer test

  php-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin
    steps:
      - uses: actions/checkout@v5
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer
      - run: composer install --no-interaction --prefer-dist
      - run: composer phpstan
      - run: composer phpcs
      - run: composer security:audit
      - run: composer dependencies:audit
      - run: composer provenance:lint
      - run: composer tokens:measure

  companion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: companion/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run tokens:measure
      - run: npm run build

  visual:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: visual
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: visual/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
