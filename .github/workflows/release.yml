name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: companion/package-lock.json

      - name: Install plugin dependencies
        working-directory: plugin
        run: composer install --no-dev --no-interaction --prefer-dist --classmap-authoritative

      - name: Build companion
        working-directory: companion
        run: |
          npm ci
          npm run build

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/stonewright
          rsync -a plugin/ dist/stonewright/ \
            --exclude tests \
            --exclude .phpunit.cache \
            --exclude .phpunit.result.cache \
            --exclude phpunit.xml \
            --exclude phpunit.xml.dist
          (cd dist && zip -qr "stonewright-${version}.zip" stonewright)
          (cd companion && npm pack --pack-destination ../dist)
          (cd dist && sha256sum "stonewright-${version}.zip" stonewright-companion-*.tgz > SHA256SUMS.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes="docs/releases/${version}.md"
          if [ ! -f "$notes" ]; then
            notes="docs/releases/checklist.md"
          fi
          gh release create "$GITHUB_REF_NAME" \
            "dist/stonewright-${version}.zip" \
            dist/stonewright-companion-*.tgz \
            dist/SHA256SUMS.txt \
            --title "Stonewright ${GITHUB_REF_NAME}" \
            --notes-file "$notes"
