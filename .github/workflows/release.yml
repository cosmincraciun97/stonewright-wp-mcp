name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            companion/package-lock.json
            visual/package-lock.json

      - name: Verify documentation freshness
        run: node scripts/check-docs-freshness.mjs

      - name: Verify plugin
        working-directory: plugin
        run: |
          composer install --no-interaction --prefer-dist
          composer test
          composer phpstan
          composer phpcs
          composer security:audit
          composer dependencies:audit
          composer provenance:lint
          composer tokens:measure

      - name: Prepare production plugin dependencies
        working-directory: plugin
        run: composer install --no-dev --no-interaction --prefer-dist --classmap-authoritative

      - name: Build companion
        working-directory: companion
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run tokens:measure
          npm run build

      - name: Build Stonewright Visual
        working-directory: visual
        run: |
          npm ci
          npm run typecheck
          npm test
          npm run build

      - name: Package release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist/stonewright
          rsync -a plugin/ dist/stonewright/ \
            --exclude tests \
            --exclude bin \
            --exclude composer.json \
            --exclude composer.lock \
            --exclude .phpunit.cache \
            --exclude .phpunit.result.cache \
            --exclude phpstan.neon \
            --exclude phpcs.xml \
            --exclude phpunit.xml \
            --exclude phpunit.xml.dist
          (cd dist && zip -qr "stonewright-${version}.zip" stonewright)
          (cd companion && npm pack --pack-destination ../dist)
          (cd visual && npm pack --pack-destination ../dist)
          if unzip -Z1 "dist/stonewright-${version}.zip" | grep -Eq '^stonewright/(tests|bin)/|^stonewright/(phpunit|phpstan|phpcs)|^stonewright/composer\.lock$'; then
            echo "Plugin archive contains development-only files" >&2
            exit 1
          fi
          (cd dist && sha256sum "stonewright-${version}.zip" stonewright-companion-*.tgz stonewright-visual-*.tgz > SHA256SUMS.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes="docs/releases/${version}.md"
          if [ ! -f "$notes" ]; then
            notes="docs/releases/checklist.md"
          fi
          # GitHub hides prereleases from the repo "Latest release" sidebar and
          # shows "N tags" instead. Alpha builds are still versioned as alpha.*,
          # but published as the Latest release so install links and the Releases
          # panel stay usable. beta/rc stay prerelease.
          release_flags=(--latest)
          case "$version" in
            *-beta*|*-rc*) release_flags=(--prerelease) ;;
            *-alpha*) release_flags=(--latest) ;;
          esac
          gh release create "$GITHUB_REF_NAME" \
            "dist/stonewright-${version}.zip" \
            dist/stonewright-companion-*.tgz \
            dist/stonewright-visual-*.tgz \
            dist/SHA256SUMS.txt \
            --title "Stonewright ${GITHUB_REF_NAME}" \
            --notes-file "$notes" \
            "${release_flags[@]}"
