name: Feature request
description: Propose a capability or improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Describe the user problem first, then the proposed behavior.
        Note whether the feature should work in Plugin mode, Direct mode, or both.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Target mode
      options:
        - Plugin mode
        - Direct mode
        - Both
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
